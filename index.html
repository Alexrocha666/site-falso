<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Notícias de Alex</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #f1f1f1;
}

/* TOPO */
.topo {
  background: #c4170c;
  padding: 10px;
  text-align: center;
}

.logo {
  width: 100px;
}

/* MENU */
.menu {
  background: #fff;
  display: flex;
  justify-content: center;
  gap: 20px;
  padding: 10px;
  border-bottom: 1px solid #ddd;
}

.menu a {
  text-decoration: none;
  color: #c4170c;
  font-weight: bold;
}

/* DESTAQUE */
.destaque {
  max-width: 1000px;
  margin: 20px auto;
  background: white;
  border-radius: 10px;
  overflow: hidden;
}

.destaque img {
  width: 100%;
  height: 300px;
  object-fit: cover;
}

.destaque h2 {
  padding: 15px;
}

/* GRID */
.container {
  max-width: 1000px;
  margin: auto;
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
  gap: 15px;
}

/* CARD */
.card {
  background: white;
  border-radius: 10px;
  overflow: hidden;
  cursor: pointer;
  transition: 0.3s;
}

.card:hover {
  transform: scale(1.03);
}

.card img {
  width: 100%;
  height: 150px;
  object-fit: cover;
}

.card h3 {
  padding: 10px;
}

/* RODAPÉ */
.footer {
  text-align: center;
  padding: 20px;
  margin-top: 30px;
  background: #222;
  color: white;
}
</style>

</head>
<body>

<!-- TOPO -->
<div class="topo">
  <img src="alex.jpg" class="logo">
</div>

<!-- MENU -->
<div class="menu">
  <a href="#">Início</a>
  <a href="#">Polícia</a>
  <a href="#">Cidade</a>
  <a href="#">Política</a>
</div>

<!-- DESTAQUE -->
<div class="destaque" id="destaque"></div>

<!-- LISTA -->
<div class="container" id="noticias"></div>

<!-- RODAPÉ -->
<div class="footer">
  © Notícias de Alex - Todos os direitos reservados
</div>

<script>
let noticias = JSON.parse(localStorage.getItem("noticias")) || [];

function carregar() {
  let destaque = document.getElementById("destaque");
  let lista = document.getElementById("noticias");

  lista.innerHTML = "";

  if (noticias.length > 0) {
    let n = noticias[noticias.length - 1];

    destaque.innerHTML = `
      <div onclick="abrir(${noticias.length - 1})" style="cursor:pointer">
        <img src="${n.imagem}">
        <h2>${n.titulo}</h2>
      </div>
    `;
  }

  noticias.slice().reverse().forEach((n, i) => {
    lista.innerHTML += `
      <div class="card" onclick="abrir(${i})">
        <img src="${n.imagem}">
        <h3>${n.titulo}</h3>
      </div>
    `;
  });
}

function abrir(i) {
  localStorage.setItem("noticiaSelecionada", i);
  window.location.href = "noticia.html";
}

carregar();
</script>

</body>
</html>
