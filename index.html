<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Notícias de Alex</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #f5f5f5;
}

header {
  background: #c4170c;
  padding: 20px;
  text-align: center;
}

header img {
  width: 120px;
}

.container {
  max-width: 1000px;
  margin: 20px auto;
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
  gap: 20px;
}

.card {
  background: white;
  border-radius: 10px;
  overflow: hidden;
  cursor: pointer;
  box-shadow: 0 2px 5px rgba(0,0,0,0.1);
}

.card img {
  width: 100%;
  height: 150px;
  object-fit: cover;
}

.card h3 {
  padding: 10px;
  margin: 0;
}
</style>

</head>
<body>

<header>
  <img src="https://via.placeholder.com/120">
</header>

<div class="container" id="noticias"></div>

<script>
let noticias = JSON.parse(localStorage.getItem("noticias")) || [];

function carregar() {
  const container = document.getElementById("noticias");
  container.innerHTML = "";

  noticias.slice().reverse().forEach((n, index) => {
    container.innerHTML += `
      <div class="card" onclick="abrir(${index})">
        <img src="${n.imagem}">
        <h3>${n.titulo}</h3>
      </div>
    `;
  });
}

function abrir(i) {
  localStorage.setItem("noticiaSelecionada", i);
  window.location.href = "noticia.html";
}

carregar();
</script>

</body>
</html>
