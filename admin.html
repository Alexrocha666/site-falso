<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Admin</title>
</head>
<body>

<h2>Nova Notícia</h2>

<input type="text" id="titulo" placeholder="Título"><br><br>
<textarea id="conteudo" placeholder="Conteúdo"></textarea><br><br>
<input type="text" id="imagem" placeholder="Link da imagem"><br><br>

<button onclick="publicar()">Publicar</button>

<script>
function publicar() {
  let titulo = document.getElementById("titulo").value;
  let conteudo = document.getElementById("conteudo").value;
  let imagem = document.getElementById("imagem").value;

  let noticias = JSON.parse(localStorage.getItem("noticias")) || [];

  noticias.push({ titulo, conteudo, imagem });

  localStorage.setItem("noticias", JSON.stringify(noticias));

  alert("Notícia publicada!");
}
</script>

</body>
</html>
